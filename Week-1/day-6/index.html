<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
</head>
<body>
    <h1> Day 6 — Mini Project (No AI)</h1>

    <div class="container" id="popUp">
        <i class="ti ti-school"></i> Add Student
    </div>

    <div class="container">
        <i class="ti ti-clipboard-list"></i> View Student List
    </div>

    <div class="form">
        <h3>Add Student</h3>
        <div class="group-line">
            <label>Student ID: </label>
            <input type="text" placeholder="e.g 2021042" id="studentId" >
        </div>
        <div class="group-line">
            <label>Student Name: </label>
            <input type="text" placeholder="e.g Juan Dela Cruz" id="studentName">
        </div>
        <div class="group-line">
            <label>Email:</label>
            <input type="text" placeholder="e.g clemente@gmail.com" id="studentEmail">
        </div>
        <div class="btn">
        <button id="sbmt">Submit</button>
        <button>Cancel</button>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
